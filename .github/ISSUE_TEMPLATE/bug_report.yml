name: Bug report
description: Something in Samplist is broken or behaving unexpectedly.
title: "Bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem with Samplist.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: "Example: I clicked Generate and the chord list disappeared."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What should someone do to trigger the issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "Example: I expected the selected chord to update without losing the voicing."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: "Example: The selected chord reset to a different range."
    validations:
      required: true

  - type: input
    id: browser-os
    attributes:
      label: Browser and operating system
      placeholder: "Example: Chrome on macOS, Safari on iPad, Firefox on Windows"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots, recordings, or extra context
      description: Drag images, videos, logs, or notes here if they help explain the issue.
